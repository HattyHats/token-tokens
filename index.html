<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token-Tokens | by HattyHats</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Global Error: ', msg, url, lineNo, columnNo, error);
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `<div style="color: white; background: #050810; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; padding: 20px; text-align: center;">
            <div>
              <h1 style="color: #ff3366;">Critical Load Error</h1>
              <p style="color: #7a9cc0;">${msg}</p>
              <button onclick="window.location.reload()" style="background: #00d4ff; color: #050810; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px;">Retry</button>
            </div>
          </div>`;
        }
        return false;
      };
      console.log("HTML Error listener initialized.");
    </script>
  </head>
  <body>
    <div id="root" style="background: #050810; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif;">
      <div style="text-align: center;">
        <h2 style="color: #00d4ff; margin-bottom: 10px;">Token-Tokens</h2>
        <p style="color: #7a9cc0; font-size: 14px;">Initializing application engine...</p>
      </div>
    </div>
    <script>
      console.log("HTML: Non-module script running.");
    </script>
    <script type="module">
      console.log("HTML: Requesting main.tsx...");
    </script>
    <script type="module" crossorigin src="src/main.tsx"></script>
  </body>
</html>
